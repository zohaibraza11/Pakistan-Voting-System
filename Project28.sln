// ============================================
//         ADMIN PANEL FUNCTIONS
// ============================================

void adminStartElection() {
    if (electionOpen) {
        cout << "Election pehle se shuru hai!" << endl;
    } else if (voterCount == 0) {
        cout << "Koi voter registered nahi! Pehle voters add karein." << endl;
    } else {
        electionOpen = true;
        cout << "Election kamyabi se SHURU ho gayi!" << endl;
        cout << "Ab " << voterCount << " registered voters vote de sakte hain." << endl;
    }
    pause();
}

void adminStopElection() {
    if (!electionOpen) {
        cout << "Election abhi shuru nahi hai!" << endl;
    } else {
        electionOpen = false;
        cout << "Election BAND kar di gayi." << endl;
        cout << "Ab koi vote nahi de sakta." << endl;
    }
    pause();
}

void adminResetVotes() {
    cout << endl;
    cout << "KHABARDAR: Tamaam votes delete ho jayenge!" << endl;
    cout << "Confirm karne ke liye 'RESET' likhein: ";
    string confirm;
    cin >> confirm;

    if (confirm == "RESET") {
        for (int i = 0; i < MAX_CANDIDATES; i++) {
            votes[i] = 0;
        }
        for (int i = 0; i < voterCount; i++) {
            voterHasVoted[i] = false;
        }
        cout << "Tamaam votes reset ho gaye!" << endl;
        cout << "Sab voters ab dobara vote de sakte hain." << endl;
    } else {
        cout << "Reset cancel kar diya." << endl;
    }
    pause();
}

void adminShowStats() {
    cout << endl;
    printLine(45);
    cout << "        ELECTION STATISTICS               " << endl;
    printLine(45);

    int didVote  = 0;
    for (int i = 0; i < voterCount; i++) {
        if (voterHasVoted[i]) didVote++;
    }
    int notVoted = voterCount - didVote;

    double turnout = 0;
    if (voterCount > 0) {
        turnout = (didVote * 100.0) / voterCount;
    }

    cout << "Election Status:    ";
    if (electionOpen) cout << "SHURU HAI (Open)" << endl;
    else              cout << "BAND HAI (Closed)" << endl;

    cout << "Registered Voters:  " << voterCount    << endl;
    cout << "Votes Cast:         " << didVote        << endl;
    cout << "Vote Nahi Diya:     " << notVoted       << endl;
    cout << "Voter Turnout:      " << (int)turnout   << "%" << endl;
    cout << "Total Votes:        " << getTotalVotes() << endl;
    printDashes(45);

    cout << "Turnout Bar: [";
    int bars = (int)(turnout / 5);
    for (int b = 0; b < bars; b++) cout << "#";
    for (int b = bars; b < 20; b++) cout << "-";
    cout << "] " << (int)turnout << "%" << endl;

    printLine(45);
    pause();
}

void adminChangePassword() {
    cout << endl;
    string oldPass, newPass, confirmPass;

    cout << "Purana Password likhein: ";
    cin >> oldPass;

    if (oldPass != adminPassword) {
        cout << "Galat password!" << endl;
        pause();
        return;
    }

    cout << "Naya Password likhein (kam se kam 6 characters): ";
    cin >> newPass;

    if (newPass.length() < 6) {
        cout << "Password bahut chota hai! Kam se kam 6 characters." << endl;
        pause();
        return;
    }

    cout << "Naya Password dobara likhein: ";
    cin >> confirmPass;

    if (newPass != confirmPass) {
        cout << "Dono password match nahi karte!" << endl;
        pause();
        return;
    }

    adminPassword = newPass;
    cout << "Password kamyabi se tabdeel ho gaya!" << endl;
    pause();
}

void adminPanel() {
    cout << endl;
    printLine(40);
    cout << "           ADMIN LOGIN                   " << endl;
    printLine(40);

    string username, password;
    cout << "Username: ";
    cin >> username;
    cout << "Password: ";
    cin >> password;

    if (username != adminUsername || password != adminPassword) {
        cout << "Galat username ya password!" << endl;
        pause();
        return;
    }

    cout << "Admin login kamyab! Khush Amdeed." << endl;

    int choice;
    while (true) {
        cout << endl;
        printLine(42);
        cout << "          ADMIN PANEL                    " << endl;
        printLine(42);
        cout << "1. Election Shuru Karein (Start)"         << endl;
        cout << "2. Election Band Karein (Stop)"           << endl;
        cout << "3. Statistics Dekheyn"                    << endl;
        cout << "4. Sab Votes Reset Karein"                << endl;
        cout << "5. Password Tabdeel Karein"               << endl;
        cout << "6. Candidates List"                       << endl;
        cout << "7. Wapis Jayen (Back)"                    << endl;
        printLine(42);
        cout << "Choice (1-7): ";
        cin >> choice;

        if      (choice == 1) adminStartElection();
        else if (choice == 2) adminStopElection();
        else if (choice == 3) adminShowStats();
        else if (choice == 4) adminResetVotes();
        else if (choice == 5) adminChangePassword();
        else if (choice == 6) { showCandidatesList(); pause(); }
        else if (choice == 7) { cout << "Admin panel se bahar aa gaye." << endl; break; }
        else cout << "Galat choice! 1-7 likhein." << endl;
    }
}

// ============================================
//         MAIN FUNCTION
// ============================================

int main() {
    showBanner();

    cout << "Pakistan Voting System mein Khush Amdeed!" << endl;
    cout << "Admin login: username=admin  password=admin123" << endl;
    cout << "Pehle Admin Panel mein ja kar Election Shuru karein." << endl;

    int choice;

    while (true) {
        showMainMenu();
        cin >> choice;

        if      (choice == 1) registerVoter();
        else if (choice == 2) castVote();
        else if (choice == 3) showResults();
        else if (choice == 4) { showCandidatesList(); pause(); }
        else if (choice == 5) showVotersList();
        else if (choice == 6) searchVoter();
        else if (choice == 7) showAbout();
        else if (choice == 8) adminPanel();
        else if (choice == 9) {
            cout << endl;
            printLine(35);
            cout << "  Shukriya! Pakistan Zindabad!  " << endl;
            printLine(35);
            break;
        } else {
            cout << "Galat choice! 1 se 9 ke darmiyan likhein." << endl;
        }
    }

    return 0;
}
