// ============================================
//         VOTER REGISTRATION
// ============================================

void registerVoter() {
    cout << endl;
    printLine(45);
    cout << "    VOTER REGISTRATION - Naya Voter       " << endl;
    printLine(45);

    if (voterCount >= MAX_VOTERS) {
        cout << "Maafi! Maximum voters limit pohonch gayi (100)." << endl;
        pause();
        return;
    }

    string name, cnic;

    cout << "Apna Poora Naam likhein: ";
    cin.ignore();
    getline(cin, name);

    if (name.length() < 3) {
        cout << "Galat naam! Naam kam se kam 3 harf ka hona chahiye." << endl;
        pause();
        return;
    }

    cout << "Apna CNIC likhein (13 ہندسے bina dash): ";
    cin >> cnic;

    if (!isValidCNIC(cnic)) {
        cout << "Galat CNIC! 13 numbers hone chahiye." << endl;
        pause();
        return;
    }

    if (cnicAlreadyRegistered(cnic)) {
        cout << "Yeh CNIC pehle se registered hai!" << endl;
        pause();
        return;
    }

    voterNames[voterCount]    = name;
    voterCNICs[voterCount]    = cnic;
    voterHasVoted[voterCount] = false;
    voterCount++;

    cout << endl;
    cout << "-----------------------------------" << endl;
    cout << "  Mubarak! Aap register ho gaye!  " << endl;
    cout << "-----------------------------------" << endl;
    cout << "Naam:  " << name << endl;
    cout << "CNIC:  " << cnic.substr(0, 5) << "XXXXXXX" << cnic.substr(12, 1) << endl;
    cout << "Voter Number: " << voterCount << endl;
    cout << "-----------------------------------" << endl;

    pause();
}

// ============================================
//         CAST VOTE
// ============================================

void castVote() {
    cout << endl;
    printLine(45);
    cout << "       VOTE DAALEIN                      " << endl;
    printLine(45);

    if (!electionOpen) {
        cout << "Election abhi shuru nahi hui!" << endl;
        cout << "Admin se rabta karein." << endl;
        pause();
        return;
    }

    if (voterCount == 0) {
        cout << "Koi voter registered nahi hai!" << endl;
        pause();
        return;
    }

    string cnic;
    cout << "Apna CNIC likhein (13 ہندسے): ";
    cin >> cnic;

    int voterIdx = findVoterByCNIC(cnic);

    if (voterIdx == -1) {
        cout << "Aap registered nahi hain!" << endl;
        cout << "Pehle registration karwayein." << endl;
        pause();
        return;
    }

    if (voterHasVoted[voterIdx]) {
        cout << "Aap pehle se vote de chuke hain!" << endl;
        cout << "Ek CNIC par sirf EK vote hota hai." << endl;
        pause();
        return;
    }

    cout << endl;
    cout << "Voter verify ho gaya!" << endl;
    cout << "Naam: " << voterNames[voterIdx] << endl;

    cout << endl;
    printLine(50);
    cout << "           BALLOT PAPER                   " << endl;
    printLine(50);
    cout << "No.  Candidate Naam        Party" << endl;
    printDashes(50);

    for (int i = 0; i < MAX_CANDIDATES; i++) {
        cout << (i + 1) << ".   ";
        cout << candidateNames[i];
        int nameLen = candidateNames[i].length();
        for (int s = nameLen; s < 18; s++) cout << " ";
        cout << " " << partyNames[i] << endl;
    }
    printLine(50);

    int choice;
    cout << "Kis ko vote dena hai? (1-" << MAX_CANDIDATES << "): ";
    cin >> choice;

    if (choice < 1 || choice > MAX_CANDIDATES) {
        cout << "Galat number! 1 se " << MAX_CANDIDATES << " ke darmiyan likhein." << endl;
        pause();
        return;
    }

    cout << endl;
    cout << "Aap ne chunaa: " << candidateNames[choice - 1] << endl;
    cout << "Party:        " << partyNames[choice - 1] << endl;
    cout << "Kya aap sure hain? (1=Haan / 2=Nahi): ";
    int confirm;
    cin >> confirm;

    if (confirm != 1) {
        cout << "Vote cancel kar diya gaya." << endl;
        pause();
        return;
    }

    votes[choice - 1]++;
    voterHasVoted[voterIdx] = true;

    cout << endl;
    cout << "=================================" << endl;
    cout << "  Vote kamyabi se darj ho gaya!  " << endl;
    cout << "  Pakistan Zindabad!              " << endl;
    cout << "=================================" << endl;

    pause();
}

// ============================================
//         SHOW RESULTS
// ============================================

void showResults() {
    cout << endl;
    printLine(55);
    cout << "          NATAAIJ - Election Results      " << endl;
    printLine(55);

    int total = getTotalVotes();
    cout << "Kul Votes Cast:    " << total << endl;
    cout << "Registered Voters: " << voterCount << endl;
    printDashes(55);

    cout << "No.  Candidate           Votes   %     Bar Chart" << endl;
    printDashes(55);

    for (int i = 0; i < MAX_CANDIDATES; i++) {
        double percent = 0;
        if (total > 0) {
            percent = (votes[i] * 100.0) / total;
        }

        cout << (i + 1) << ".   ";
        cout << candidateNames[i];
        int nameLen = candidateNames[i].length();
        for (int s = nameLen; s < 18; s++) cout << " ";

        cout << "  " << votes[i];
        if      (votes[i] < 10)  cout << "     ";
        else if (votes[i] < 100) cout << "    ";
        else                     cout << "   ";

        int pInt = (int)percent;
        if (pInt < 10) cout << " ";
        cout << pInt << "%   ";

        // bar chart using #
        int bars = (int)(percent / 5);
        for (int b = 0; b < bars; b++) cout << "#";
        cout << endl;
    }

    printLine(55);

    if (total == 0) {
        cout << "Abhi koi vote nahi dala gaya." << endl;
    } else {
        int winnerIdx = getWinnerIndex();
        double winPct = (votes[winnerIdx] * 100.0) / total;
        cout << endl;
        cout << "*** WINNER: " << candidateNames[winnerIdx] << " ***" << endl;
        cout << "Party:  " << partyNames[winnerIdx] << endl;
        cout << "Votes:  " << votes[winnerIdx] << " (" << (int)winPct << "%)" << endl;
    }

    printLine(55);
    pause();
}

// ============================================
//         SHOW VOTERS LIST
// ============================================

void showVotersList() {
    cout << endl;
    printLine(52);
    cout << "           VOTERS KI LIST                 " << endl;
    printLine(52);

    if (voterCount == 0) {
        cout << "Koi voter registered nahi hai." << endl;
        pause();
        return;
    }

    cout << "Kul Registered Voters: " << voterCount << endl;
    printDashes(52);
    cout << "No.  Naam               CNIC (Masked)   Status" << endl;
    printDashes(52);

    for (int i = 0; i < voterCount; i++) {
        if (i + 1 < 10) cout << (i + 1) << ".   ";
        else             cout << (i + 1) << ".  ";

        cout << voterNames[i];
        int nameLen = voterNames[i].length();
        for (int s = nameLen; s < 20; s++) cout << " ";

        string masked = voterCNICs[i].substr(0, 5) + "XXXXX" + voterCNICs[i].substr(10, 3);
        cout << masked << "  ";

        if (voterHasVoted[i]) cout << "Vote Diya" << endl;
        else                  cout << "Nahi Diya" << endl;
    }

    printLine(52);
    pause();
}

// ============================================
//         SEARCH VOTER
// ============================================

void searchVoter() {
    cout << endl;
    printLine(45);
    cout << "       VOTER TALASH KAREIN               " << endl;
    printLine(45);

    if (voterCount == 0) {
        cout << "Koi voter registered nahi hai." << endl;
        pause();
        return;
    }

    string cnic;
    cout << "CNIC likhein (13 ہندسے): ";
    cin >> cnic;

    int idx = findVoterByCNIC(cnic);

    if (idx == -1) {
        cout << endl;
        cout << "Yeh CNIC registered nahi hai." << endl;
    } else {
        cout << endl;
        cout << "------- Voter Mila! -------" << endl;
        cout << "Voter No:    " << (idx + 1) << endl;
        cout << "Naam:        " << voterNames[idx] << endl;
        cout << "CNIC:        " << cnic.substr(0,5) << "XXXXXXX" << cnic.substr(12,1) << endl;
        cout << "Vote Status: ";
        if (voterHasVoted[idx]) cout << "Vote de chuka hai." << endl;
        else                    cout << "Abhi vote nahi diya." << endl;
        cout << "---------------------------" << endl;
    }

    pause();
}

