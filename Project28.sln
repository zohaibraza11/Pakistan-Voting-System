#include <iostream>
#include <string>
using namespace std;

// ============================================
//   PAKISTAN VOTING SYSTEM
//   Language: C++ (Basic Level)
//   Concepts: Arrays, Functions, Loops,
//             If/Else, Basic Input/Output
// ============================================

// ---- Constants ----
const int MAX_CANDIDATES = 5;
const int MAX_VOTERS     = 100;

// ---- Global Arrays ----
string candidateNames[MAX_CANDIDATES] = {
    "Imran Khan",
    "Nawaz Sharif",
    "Bilawal Bhutto",
    "Siraj ul Haq",
    "Altaf Hussain"
};

string partyNames[MAX_CANDIDATES] = {
    "Pakistan Tehreek-e-Insaf",
    "Pakistan Muslim League (N)",
    "Pakistan Peoples Party",
    "Jamaat-e-Islami",
    "Muttahida Qaumi Movement"
};

string partySymbols[MAX_CANDIDATES] = {
    "Bat (Chirri)",
    "Sher (Lion)",
    "Teer (Arrow)",
    "Mizan (Scale)",
    "Patang (Kite)"
};

int votes[MAX_CANDIDATES] = {0, 0, 0, 0, 0};

// ---- Voter Records ----
string voterNames[MAX_VOTERS];
string voterCNICs[MAX_VOTERS];
bool   voterHasVoted[MAX_VOTERS];
int    voterCount = 0;

// ---- Admin ----
string adminUsername = "admin";
string adminPassword = "admin123";

// ---- Election Status ----
bool electionOpen = false;

// ============================================
//         HELPER FUNCTIONS
// ============================================

void printLine(int len) {
    for (int i = 0; i < len; i++) cout << "=";
    cout << endl;
}

void printDashes(int len) {
    for (int i = 0; i < len; i++) cout << "-";
    cout << endl;
}

void pause() {
    cout << "\nEnter dabayein jari rakhne ke liye...";
    cin.ignore();
    cin.get();
}

bool isValidCNIC(string cnic) {
    if (cnic.length() != 13) return false;
    for (int i = 0; i < 13; i++) {
        if (cnic[i] < '0' || cnic[i] > '9') return false;
    }
    return true;
}

bool cnicAlreadyRegistered(string cnic) {
    for (int i = 0; i < voterCount; i++) {
        if (voterCNICs[i] == cnic) return true;
    }
    return false;
}

int findVoterByCNIC(string cnic) {
    for (int i = 0; i < voterCount; i++) {
        if (voterCNICs[i] == cnic) return i;
    }
    return -1;
}

int getTotalVotes() {
    int total = 0;
    for (int i = 0; i < MAX_CANDIDATES; i++) {
        total += votes[i];
    }
    return total;
}

int getWinnerIndex() {
    int maxVotes = votes[0];
    int winner   = 0;
    for (int i = 1; i < MAX_CANDIDATES; i++) {
        if (votes[i] > maxVotes) {
            maxVotes = votes[i];
            winner   = i;
        }
    }
    return winner;
}

